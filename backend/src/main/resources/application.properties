spring.application.name=diary-backend

# Server
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:diarydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# JWT
jwt.secret=dGhpc0lzQVN1cGVyU2VjcmV0S2V5Rm9yRGlhcnlBcHBUaGF0SXNMb25nRW5vdWdoRm9ySFMyNTY=
jwt.expiration=86400000

# File upload / request size (for base64 avatar uploads)
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
server.tomcat.max-http-form-post-size=5MB
